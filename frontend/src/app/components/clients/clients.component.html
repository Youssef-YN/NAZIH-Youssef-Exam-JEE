<div class="container mt-2">
  <div class="row">
    <div class="col col-md-5">
      <div class="card">
        <div class="card-header">New Client</div>
        <div class="card-body">
          <form [formGroup]="clientFormGroup" (ngSubmit)="handleSaveClient()">
            <div class="mb-3">
              <label class="form-label">Name :</label>
              <input type="text" formControlName="name" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Email :</label>
              <input type="email" formControlName="email" class="form-control">
            </div>
            <div class="d-grid mb-3">
              <button class="btn btn-success">
                <i class="bi bi-plus-circle"></i> Save Client
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div class="col col-md-7">
      <div class="card">
        <div class="card-header">Clients</div>
        <div class="card-body">
          <ng-container *ngIf="clientsObservable | async as clients; else errorTemplate">
            <table class="table">
              <thead>
                <tr><th>ID</th><th>Name</th><th>Email</th><th></th></tr>
              </thead>
              <tbody>
                <tr *ngFor="let client of clients">
                  <td>{{client.id}}</td>
                  <td>{{client.name}}</td>
                  <td>{{client.email}}</td>
                  <td>
                    <button (click)="handleDeleteClient(client)" class="btn btn-danger btn-sm">
                      <i class="bi bi-trash"></i>
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </ng-container>
          <ng-template #errorTemplate>
            <ng-container *ngIf="errorMessage; else loading">
              <div class="text-danger">{{errorMessage}}</div>
            </ng-container>
            <ng-template #loading>Loading ...</ng-template>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>
